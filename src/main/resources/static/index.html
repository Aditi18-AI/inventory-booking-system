<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inventory Booking System</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f4f4f4; color: #333; }

        header {
            background: #232f3e;
            color: white;
            padding: 16px 32px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        header h1 { font-size: 20px; }
        header span { font-size: 13px; color: #ff9900; }

        .container { max-width: 1100px; margin: 32px auto; padding: 0 16px; }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        .card {
            background: white;
            border-radius: 8px;
            padding: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.08);
        }
        .card h2 { font-size: 16px; margin-bottom: 16px; color: #232f3e; border-bottom: 2px solid #ff9900; padding-bottom: 8px; }

        table { width: 100%; border-collapse: collapse; font-size: 14px; }
        th { background: #232f3e; color: white; padding: 10px; text-align: left; }
        td { padding: 10px; border-bottom: 1px solid #eee; }
        tr:hover td { background: #fff8f0; }

        .form-group { margin-bottom: 14px; }
        label { display: block; font-size: 13px; margin-bottom: 4px; color: #555; }
        input, select {
            width: 100%;
            padding: 9px 12px;
            border: 1px solid #ddd;
            border-radius: 4px;
            font-size: 14px;
        }
        button {
            background: #ff9900;
            color: white;
            border: none;
            padding: 10px 24px;
            border-radius: 4px;
            font-size: 14px;
            cursor: pointer;
            width: 100%;
            margin-top: 8px;
        }
        button:hover { background: #e68a00; }

        .badge {
            display: inline-block;
            padding: 2px 10px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-success { background: #d4edda; color: #155724; }
        .badge-danger { background: #f8d7da; color: #721c24; }

        .message {
            padding: 12px;
            border-radius: 4px;
            margin-top: 12px;
            font-size: 14px;
            display: none;
        }
        .message.success { background: #d4edda; color: #155724; display: block; }
        .message.error { background: #f8d7da; color: #721c24; display: block; }

        .full-width { grid-column: 1 / -1; }
    </style>
</head>
<body>

<header>
    <div>
        <h1>🏭 Inventory Booking System</h1>
        <span>Tata Steel — B2B Steel Coil Management</span>
    </div>
</header>

<div class="container">
    <div class="grid">

        <!-- Steel Grades -->
        <div class="card">
            <h2>📦 Steel Grades & Stock</h2>
            <table>
                <thead>
                <tr>
                    <th>Grade</th>
                    <th>Description</th>
                    <th>Stock (tonnes)</th>
                </tr>
                </thead>
                <tbody id="steelGradeTable">
                <tr><td colspan="3" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
            <button onclick="loadSteelGrades()" style="margin-top:12px">🔄 Refresh Stock</button>
        </div>

        <!-- Place Order -->
        <div class="card">
            <h2>🛒 Place an Order</h2>
            <div class="form-group">
                <label>Client ID</label>
                <input type="number" id="clientId" placeholder="Enter client ID" />
            </div>
            <div class="form-group">
                <label>Steel Grade ID</label>
                <input type="number" id="steelGradeId" placeholder="Enter steel grade ID" />
            </div>
            <div class="form-group">
                <label>Quantity (tonnes)</label>
                <input type="number" id="quantity" placeholder="Enter quantity" />
            </div>
            <button onclick="placeOrder()">✅ Place Order</button>
            <div id="orderMessage" class="message"></div>
        </div>

        <!-- Recent Orders -->
        <div class="card full-width">
            <h2>📋 Recent Orders</h2>
            <table>
                <thead>
                <tr>
                    <th>Order ID</th>
                    <th>Client</th>
                    <th>Steel Grade</th>
                    <th>Quantity</th>
                    <th>Status</th>
                    <th>Date</th>
                </tr>
                </thead>
                <tbody id="ordersTable">
                <tr><td colspan="6" style="text-align:center">Loading...</td></tr>
                </tbody>
            </table>
            <button onclick="loadOrders()" style="margin-top:12px">🔄 Refresh Orders</button>
        </div>

    </div>
</div>

<script>
    const BASE_URL = 'http://localhost:8080';

    async function loadSteelGrades() {
        try {
            const res = await fetch(`${BASE_URL}/api/steel-grades`);
            const data = await res.json();
            const tbody = document.getElementById('steelGradeTable');
            tbody.innerHTML = data.map(g => `
                <tr>
                    <td><strong>${g.gradeName}</strong></td>
                    <td>${g.description || '-'}</td>
                    <td>
                        <span class="badge ${g.availableQuantity > 0 ? 'badge-success' : 'badge-danger'}">
                            ${g.availableQuantity} ${g.unit}
                        </span>
                    </td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('steelGradeTable').innerHTML =
                '<tr><td colspan="3" style="text-align:center;color:red">Failed to load</td></tr>';
        }
    }

    async function loadOrders() {
        try {
            const res = await fetch(`${BASE_URL}/api/orders`);
            const data = await res.json();
            const tbody = document.getElementById('ordersTable');
            tbody.innerHTML = data.map(o => `
                <tr>
                    <td>#${o.id}</td>
                    <td>${o.client.clientName}</td>
                    <td>${o.steelGrade.gradeName}</td>
                    <td>${o.quantityBooked} tonnes</td>
                    <td><span class="badge badge-success">${o.status}</span></td>
                    <td>${new Date(o.createdAt).toLocaleDateString()}</td>
                </tr>
            `).join('');
        } catch (e) {
            document.getElementById('ordersTable').innerHTML =
                '<tr><td colspan="6" style="text-align:center;color:red">Failed to load</td></tr>';
        }
    }

    async function placeOrder() {
        const clientId = document.getElementById('clientId').value;
        const steelGradeId = document.getElementById('steelGradeId').value;
        const quantity = document.getElementById('quantity').value;
        const msg = document.getElementById('orderMessage');

        if (!clientId || !steelGradeId || !quantity) {
            msg.className = 'message error';
            msg.textContent = 'Please fill all fields.';
            return;
        }

        try {
            const res = await fetch(
                `${BASE_URL}/api/orders?clientId=${clientId}&steelGradeId=${steelGradeId}&quantity=${quantity}`,
                { method: 'POST' }
            );
            if (res.ok) {
                msg.className = 'message success';
                msg.textContent = '✅ Order placed successfully!';
                loadSteelGrades();
                loadOrders();
            } else {
                const err = await res.json();
                msg.className = 'message error';
                msg.textContent = '❌ ' + (err.message || 'Order failed.');
            }
        } catch (e) {
            msg.className = 'message error';
            msg.textContent = '❌ Could not connect to server.';
        }
    }

    loadSteelGrades();
    loadOrders();
</script>

</body>
</html>
